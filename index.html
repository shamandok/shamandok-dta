<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💘 Dating App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF4D8D;
    --pink-light: #FF85AF;
    --pink-pale: #FFE8F1;
    --coral: #FF6B6B;
    --purple: #7B4FFF;
    --gold: #FFB347;
    --dark: #1A0A14;
    --dark2: #2D1525;
    --text: #F5E8EE;
    --text-muted: #B8899A;
    --card-bg: rgba(255,255,255,0.07);
    --radius: 24px;
    --radius-sm: 14px;
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(255,77,141,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(123,79,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 30% 30% at 60% 30%, rgba(255,107,107,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* NAV */
  nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
    background: rgba(26,10,20,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,77,141,0.15);
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    max-width: 430px;
    margin: 0 auto;
  }

  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer; padding: 6px 20px;
    color: var(--text-muted); transition: var(--transition); border-radius: 12px;
  }
  .nav-btn.active { color: var(--pink); }
  .nav-btn .nav-icon { font-size: 22px; }
  .nav-btn .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .nav-btn:active { transform: scale(0.9); }

  /* PAGES */
  .page { display: none; flex-direction: column; flex: 1; padding-bottom: 80px; }
  .page.active { display: flex; }

  /* HEADER */
  .page-header {
    padding: 20px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .page-title {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--pink), var(--pink-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ─── DISCOVER PAGE ─── */
  #page-discover { padding-bottom: 0; }

  .discover-header {
    padding: 20px 20px 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 700;
    background: linear-gradient(135deg, #FF4D8D, #FF85AF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .filter-btn {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--card-bg); border: 1px solid rgba(255,77,141,0.2);
    color: var(--pink); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .filter-btn:active { transform: scale(0.9); background: rgba(255,77,141,0.2); }

  /* CARDS STACK */
  .cards-container {
    flex: 1; position: relative;
    padding: 10px 20px;
    display: flex; align-items: center; justify-content: center;
    min-height: 500px;
  }

  .card-stack { position: relative; width: 100%; max-width: 390px; }

  .profile-card {
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: 28px;
    overflow: hidden;
    position: relative;
    background: var(--dark2);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
    cursor: grab;
    user-select: none;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    will-change: transform;
  }
  .profile-card:active { cursor: grabbing; }

  .card-bg {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #2D1525, #1A0A14);
    display: flex; align-items: center; justify-content: center;
  }
  .card-bg .no-photo { font-size: 80px; }

  .card-photo {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .card-gradient {
    position: absolute; bottom: 0; left: 0; right: 0; height: 65%;
    background: linear-gradient(to top, rgba(10,3,8,0.95) 0%, rgba(10,3,8,0.5) 50%, transparent 100%);
  }

  .card-info {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 24px 22px;
  }

  .card-name {
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 700;
    line-height: 1.1; margin-bottom: 4px;
  }
  .card-age { color: var(--pink-light); font-size: 18px; font-weight: 500; }
  .card-city { color: var(--text-muted); font-size: 14px; margin-top: 2px; }

  .card-bio {
    margin-top: 10px;
    font-size: 14px; color: rgba(255,255,255,0.8);
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  .card-interests {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
  }
  .interest-tag {
    background: rgba(255,77,141,0.2); border: 1px solid rgba(255,77,141,0.3);
    border-radius: 20px; padding: 4px 12px;
    font-size: 12px; color: var(--pink-light);
  }

  /* Swipe overlays */
  .swipe-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.1s; pointer-events: none;
    border-radius: 28px;
  }
  .swipe-overlay.like { background: rgba(0,230,130,0.1); }
  .swipe-overlay.nope { background: rgba(255,60,60,0.1); }
  .swipe-overlay-label {
    font-family: 'Fraunces', serif;
    font-size: 52px; font-weight: 700;
    border: 4px solid;
    border-radius: 12px; padding: 8px 20px;
    transform: rotate(-15deg);
  }
  .swipe-overlay.like .swipe-overlay-label { color: #00E682; border-color: #00E682; transform: rotate(-10deg); }
  .swipe-overlay.nope .swipe-overlay-label { color: #FF3C3C; border-color: #FF3C3C; transform: rotate(10deg); }

  /* Action buttons */
  .action-btns {
    display: flex; align-items: center; justify-content: center;
    gap: 18px; padding: 20px;
  }

  .action-btn {
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: var(--transition);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }
  .action-btn:active { transform: scale(0.88); }

  .btn-pass {
    width: 56px; height: 56px; font-size: 22px;
    background: rgba(255,60,60,0.15); color: #FF6B6B;
    border: 2px solid rgba(255,107,107,0.3);
  }
  .btn-super {
    width: 52px; height: 52px; font-size: 20px;
    background: rgba(255,179,71,0.15); color: var(--gold);
    border: 2px solid rgba(255,179,71,0.3);
  }
  .btn-like {
    width: 68px; height: 68px; font-size: 28px;
    background: linear-gradient(135deg, var(--pink), var(--coral));
    color: white;
    box-shadow: 0 8px 30px rgba(255,77,141,0.4);
  }
  .btn-boost {
    width: 52px; height: 52px; font-size: 20px;
    background: rgba(123,79,255,0.15); color: var(--purple);
    border: 2px solid rgba(123,79,255,0.3);
  }

  /* Background cards */
  .card-behind {
    position: absolute; inset: 0;
    border-radius: 28px;
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.05);
  }
  .card-behind-2 {
    transform: translateY(-8px) scale(0.95);
    opacity: 0.5;
  }
  .card-behind-1 {
    transform: translateY(-4px) scale(0.975);
    opacity: 0.7;
  }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px; padding: 40px 20px;
    text-align: center; flex: 1;
  }
  .empty-icon { font-size: 64px; }
  .empty-title { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; }
  .empty-text { color: var(--text-muted); font-size: 15px; line-height: 1.5; max-width: 280px; }

  /* ─── MATCHES PAGE ─── */
  .matches-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px; padding: 0 20px;
  }

  .match-card {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px; overflow: hidden;
    cursor: pointer; transition: var(--transition);
    position: relative;
  }
  .match-card:active { transform: scale(0.96); }

  .match-photo {
    width: 100%; aspect-ratio: 1;
    background: var(--dark2);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; overflow: hidden; position: relative;
  }
  .match-photo img { width: 100%; height: 100%; object-fit: cover; }

  .match-info { padding: 10px 12px; }
  .match-name { font-weight: 600; font-size: 15px; }
  .match-age { color: var(--text-muted); font-size: 13px; }

  .new-match-badge {
    position: absolute; top: 8px; right: 8px;
    background: var(--pink); color: white;
    border-radius: 10px; padding: 2px 8px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  }

  /* ─── CHAT PAGE ─── */
  .chat-list { padding: 0 20px; display: flex; flex-direction: column; gap: 2px; }

  .chat-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-radius: 16px;
    cursor: pointer; transition: var(--transition);
    background: transparent;
  }
  .chat-item:active { background: var(--card-bg); }

  .chat-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0; overflow: hidden; position: relative;
  }
  .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-online {
    position: absolute; bottom: 1px; right: 1px;
    width: 12px; height: 12px; background: #00E682;
    border: 2px solid var(--dark); border-radius: 50%;
  }

  .chat-content { flex: 1; min-width: 0; }
  .chat-name { font-weight: 600; font-size: 15px; margin-bottom: 3px; }
  .chat-preview { color: var(--text-muted); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .chat-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .chat-time { color: var(--text-muted); font-size: 12px; }
  .unread-badge {
    background: var(--pink); color: white;
    border-radius: 10px; padding: 2px 7px;
    font-size: 11px; font-weight: 700;
  }

  /* ─── CHAT VIEW ─── */
  #chat-view {
    display: none; flex-direction: column;
    position: fixed; inset: 0;
    background: var(--dark); z-index: 200;
    max-width: 430px; margin: 0 auto;
  }
  #chat-view.open { display: flex; }

  .chat-view-header {
    padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
    background: rgba(26,10,20,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,77,141,0.1);
    position: sticky; top: 0;
  }

  .back-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--card-bg); border: none;
    color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .back-btn:active { transform: scale(0.9); }

  .chat-view-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; overflow: hidden;
  }
  .chat-view-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .chat-view-name { font-weight: 600; font-size: 16px; }
  .chat-view-status { font-size: 12px; color: #00E682; }

  .messages-list {
    flex: 1; overflow-y: auto;
    padding: 16px 16px 100px;
    display: flex; flex-direction: column; gap: 8px;
  }

  .message {
    max-width: 75%; padding: 10px 14px;
    border-radius: 18px; font-size: 15px; line-height: 1.4;
    word-break: break-word;
  }
  .message.mine {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--pink), var(--coral));
    color: white;
    border-bottom-right-radius: 6px;
  }
  .message.theirs {
    align-self: flex-start;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.07);
    border-bottom-left-radius: 6px;
  }
  .message-time { font-size: 11px; opacity: 0.6; margin-top: 4px; text-align: right; }

  .chat-input-area {
    position: fixed; bottom: 0; left: 0; right: 0;
    max-width: 430px; margin: 0 auto;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: rgba(26,10,20,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,77,141,0.1);
    display: flex; gap: 10px; align-items: flex-end;
  }

  .msg-input {
    flex: 1; background: var(--card-bg);
    border: 1px solid rgba(255,77,141,0.2);
    border-radius: 22px; padding: 10px 18px;
    color: var(--text); font-size: 15px; font-family: inherit;
    resize: none; max-height: 120px; outline: none;
    transition: border-color var(--transition);
  }
  .msg-input:focus { border-color: rgba(255,77,141,0.5); }
  .msg-input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--coral));
    border: none; color: white; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: var(--transition);
    box-shadow: 0 4px 15px rgba(255,77,141,0.4);
  }
  .send-btn:active { transform: scale(0.9); }

  /* ─── PROFILE PAGE ─── */
  .profile-page { padding: 0 0 80px; }

  .profile-hero {
    position: relative; height: 280px;
    background: linear-gradient(135deg, var(--dark2), var(--dark));
    overflow: hidden;
  }
  .profile-hero-img {
    width: 100%; height: 100%; object-fit: cover; opacity: 0.8;
  }
  .profile-hero-gradient {
    position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
    background: linear-gradient(to top, var(--dark), transparent);
  }

  .profile-avatar-wrap {
    display: flex; justify-content: center;
    margin-top: -60px; margin-bottom: 12px; position: relative; z-index: 10;
  }
  .profile-avatar {
    width: 120px; height: 120px; border-radius: 50%;
    border: 4px solid var(--dark);
    background: linear-gradient(135deg, var(--pink), var(--purple));
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    font-size: 48px; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    cursor: pointer;
  }
  .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .profile-body { padding: 0 20px; }
  .profile-display-name {
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 700;
    text-align: center; margin-bottom: 4px;
  }
  .profile-location { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }

  .profile-section { margin-bottom: 24px; }
  .section-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 10px;
  }

  .input-field {
    width: 100%; background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-sm); padding: 14px 16px;
    color: var(--text); font-size: 15px; font-family: inherit;
    outline: none; transition: border-color var(--transition);
  }
  .input-field:focus { border-color: rgba(255,77,141,0.5); }
  .input-field::placeholder { color: var(--text-muted); }
  textarea.input-field { resize: none; min-height: 90px; }

  .interests-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .interest-chip {
    background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 8px 14px;
    font-size: 13px; cursor: pointer; transition: var(--transition);
    user-select: none;
  }
  .interest-chip.selected {
    background: rgba(255,77,141,0.2); border-color: var(--pink);
    color: var(--pink-light);
  }
  .interest-chip:active { transform: scale(0.95); }

  .photos-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .photo-slot {
    aspect-ratio: 1; border-radius: 14px;
    background: var(--card-bg); border: 2px dashed rgba(255,77,141,0.3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden; transition: var(--transition);
    position: relative;
  }
  .photo-slot:active { transform: scale(0.97); }
  .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
  .photo-slot .add-icon { font-size: 28px; color: var(--text-muted); }
  .photo-slot .remove-photo {
    position: absolute; top: 4px; right: 4px;
    width: 24px; height: 24px; border-radius: 50%;
    background: rgba(255,60,60,0.85); border: none;
    color: white; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .save-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--pink), var(--coral));
    border: none; border-radius: var(--radius-sm);
    color: white; font-family: inherit; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: var(--transition);
    box-shadow: 0 6px 20px rgba(255,77,141,0.4);
  }
  .save-btn:active { transform: scale(0.98); box-shadow: 0 2px 10px rgba(255,77,141,0.3); }
  .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ─── FILTER MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
    display: none; align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }

  .modal-sheet {
    background: #1E0D1A;
    border-radius: 28px 28px 0 0;
    padding: 20px 20px calc(30px + env(safe-area-inset-bottom));
    width: 100%; border-top: 1px solid rgba(255,77,141,0.2);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.2); margin: 0 auto 20px;
  }
  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 700; margin-bottom: 24px;
  }

  /* Range slider */
  .range-group { margin-bottom: 24px; }
  .range-label { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
  .range-label span { color: var(--text); font-weight: 600; }
  input[type=range] {
    width: 100%; accent-color: var(--pink); height: 4px;
    background: rgba(255,255,255,0.1); border-radius: 2px;
    outline: none; cursor: pointer;
  }

  .select-group { margin-bottom: 24px; }
  .select-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .select-option {
    flex: 1; min-width: 80px; padding: 10px;
    background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: var(--text); font-family: inherit;
    font-size: 14px; cursor: pointer; transition: var(--transition); text-align: center;
  }
  .select-option.active {
    background: rgba(255,77,141,0.2); border-color: var(--pink); color: var(--pink-light);
  }

  /* ─── MATCH ANIMATION ─── */
  .match-popup {
    position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(20px);
  }
  .match-popup.show { display: flex; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .match-popup-content {
    text-align: center; padding: 40px 30px;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .match-hearts { font-size: 60px; margin-bottom: 20px; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API_BASE = "https://YOUR_SERVER_URL/api"; // Change to your server
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let currentUser = null;
let candidates = [];
let currentCardIndex = 0;
let currentMatchId = null;
let openMatchData = null;

const INTERESTS_LIST = [
  "🎵 Музыка","🎮 Игры","📚 Книги","🎨 Творчество","🏃 Спорт",
  "🍕 Еда","✈️ Путешествия","🐶 Животные","📸 Фото","🎬 Кино",
  "💃 Танцы","🧘 Йога","🏋️ Фитнес","🎭 Театр","🌿 Природа"
];

// ─── API ─────────────────────────────────────────────────────────────────────
function getHeaders() {
  const initData = tg?.initData || "test_mode";
  return {
    "Content-Type": "application/json",
    "X-Telegram-Init-Data": initData
  };
}

async function apiCall(method, path, body = null) {
  try {
    const opts = { method, headers: getHeaders() };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API_BASE + path, opts);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    return await res.json();
  } catch (e) {
    console.error("API error:", e);
    throw e;
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    currentUser = await apiCall("GET", "/me");
    await loadDiscover();
    renderProfile();
  } catch (e) {
    // Demo mode — use mock data
    currentUser = getMockUser();
    candidates = getMockCandidates();
    renderCards();
    renderProfile();
    showToast("📱 Демо-режим");
  }
}

function getMockUser() {
  return {
    id: 1, name: "Алексей", age: 25,
    gender: "male", looking_for: "female",
    bio: "Люблю путешествия и хороший кофе ☕",
    city: "Москва",
    interests: ["✈️ Путешествия","🎵 Музыка","🍕 Еда"],
    photos: [],
    min_age_filter: 18, max_age_filter: 45
  };
}

function getMockCandidates() {
  return [
    { id: 2, name: "Анастасия", age: 23, gender: "female", city: "Москва",
      bio: "Художница и любительница кошек 🐱 Ищу вдохновение и приключения",
      interests: ["🎨 Творчество","🐶 Животные","📸 Фото"], photos: [] },
    { id: 3, name: "Мария", age: 26, gender: "female", city: "Санкт-Петербург",
      bio: "Путешествую, читаю, мечтаю 🌍",
      interests: ["📚 Книги","✈️ Путешествия","🎬 Кино"], photos: [] },
    { id: 4, name: "Екатерина", age: 24, gender: "female", city: "Казань",
      bio: "Музыкант и фотограф. Обожаю закаты 🌅",
      interests: ["🎵 Музыка","📸 Фото","🌿 Природа"], photos: [] },
    { id: 5, name: "Юлия", age: 28, gender: "female", city: "Москва",
      bio: "Фитнес-тренер. Жизнь — это движение 💪",
      interests: ["🏋️ Фитнес","🧘 Йога","🏃 Спорт"], photos: [] },
  ];
}

function getMockMatches() {
  return [
    { id: 101, created_at: new Date().toISOString(), other_user: getMockCandidates()[0] },
    { id: 102, created_at: new Date().toISOString(), other_user: getMockCandidates()[2] },
  ];
}

// ─── DISCOVER / CARDS ─────────────────────────────────────────────────────────
async function loadDiscover() {
  try {
    candidates = await apiCall("GET", "/candidates");
  } catch (e) {
    candidates = getMockCandidates();
  }
  currentCardIndex = 0;
  renderCards();
}

function renderCards() {
  const container = document.getElementById("cards-container");
  const actionBtns = document.getElementById("action-btns");

  if (candidates.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💔</div>
        <div class="empty-title">Никого нет поблизости</div>
        <div class="empty-text">Попробуйте расширить фильтры поиска или зайдите позже</div>
      </div>`;
    actionBtns.style.display = "none";
    return;
  }

  actionBtns.style.display = "flex";

  const remaining = candidates.slice(currentCardIndex);
  if (remaining.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎉</div>
        <div class="empty-title">Вы просмотрели всех!</div>
        <div class="empty-text">Новые анкеты появятся позже. Заглядывайте почаще!</div>
      </div>`;
    actionBtns.style.display = "none";
    return;
  }

  container.innerHTML = `<div class="card-stack" id="card-stack">
    <div class="card-behind card-behind-2"></div>
    <div class="card-behind card-behind-1"></div>
    ${buildCard(remaining[0])}
  </div>`;

  setupSwipe(document.querySelector(".profile-card"));
}

function buildCard(user) {
  const photo = user.photos?.[0];
  const photoBg = photo
    ? `<img src="${photo}" class="card-photo" alt="${user.name}" onerror="this.style.display='none'">`
    : `<div class="card-bg"><div class="no-photo">👤</div></div>`;

  const tags = (user.interests || []).slice(0, 3)
    .map(i => `<span class="interest-tag">${i}</span>`).join("");

  return `<div class="profile-card" id="main-card">
    ${photoBg}
    <div class="card-gradient"></div>
    <div class="swipe-overlay like"><div class="swipe-overlay-label">ЛАЙК</div></div>
    <div class="swipe-overlay nope"><div class="swipe-overlay-label">МИМО</div></div>
    <div class="card-info">
      <div class="card-name">${user.name} <span class="card-age">${user.age}</span></div>
      ${user.city ? `<div class="card-city">📍 ${user.city}</div>` : ""}
      ${user.bio ? `<div class="card-bio">${user.bio}</div>` : ""}
      ${tags ? `<div class="card-interests">${tags}</div>` : ""}
    </div>
  </div>`;
}

// ─── SWIPE LOGIC ─────────────────────────────────────────────────────────────
function setupSwipe(card) {
  if (!card) return;
  let startX, startY, currentX = 0, isDragging = false;

  function onStart(e) {
    const touch = e.touches?.[0] || e;
    startX = touch.clientX; startY = touch.clientY;
    isDragging = true;
    card.style.transition = "none";
  }
  function onMove(e) {
    if (!isDragging) return;
    const touch = e.touches?.[0] || e;
    currentX = touch.clientX - startX;
    const rotate = currentX * 0.05;
    card.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;

    const likeOverlay = card.querySelector(".swipe-overlay.like");
    const nopeOverlay = card.querySelector(".swipe-overlay.nope");
    if (currentX > 30) {
      likeOverlay.style.opacity = Math.min(currentX / 80, 1);
      nopeOverlay.style.opacity = 0;
    } else if (currentX < -30) {
      nopeOverlay.style.opacity = Math.min(-currentX / 80, 1);
      likeOverlay.style.opacity = 0;
    } else {
      likeOverlay.style.opacity = 0;
      nopeOverlay.style.opacity = 0;
    }
    if (e.cancelable) e.preventDefault();
  }
  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    card.style.transition = "transform 0.3s ease";
    if (currentX > 80) {
      animateSwipe("right");
    } else if (currentX < -80) {
      animateSwipe("left");
    } else {
      card.style.transform = "";
    }
    currentX = 0;
  }

  card.addEventListener("touchstart", onStart, { passive: true });
  card.addEventListener("touchmove", onMove, { passive: false });
  card.addEventListener("touchend", onEnd);
  card.addEventListener("mousedown", onStart);
  document.addEventListener("mousemove", onMove);
  document.addEventListener("mouseup", onEnd);
}

function animateSwipe(dir) {
  const card = document.getElementById("main-card");
  if (!card) return;
  const x = dir === "right" ? 600 : -600;
  const rotate = dir === "right" ? 30 : -30;
  card.style.transform = `translateX(${x}px) rotate(${rotate}deg)`;
  card.style.opacity = "0";

  if (dir === "right") doLike(false);
  else doPass();

  setTimeout(() => {
    currentCardIndex++;
    renderCards();
  }, 350);
}

function swipeLike() { animateSwipe("right"); }
function swipeNope() { animateSwipe("left"); }
function superLike() {
  doLike(true);
  showToast("⭐ Супер-лайк!");
  setTimeout(() => { currentCardIndex++; renderCards(); }, 400);
}

async function doLike(superL = false) {
  const user = candidates[currentCardIndex];
  if (!user) return;
  try {
    const res = await apiCall("POST", "/like", { target_id: user.id, super_like: superL });
    if (res.match) {
      openMatchData = { matchId: res.match_id, user };
      setTimeout(() => showMatchPopup(user, res.match_id), 400);
    }
  } catch(e) {
    // Demo: random match
    if (Math.random() < 0.3) {
      setTimeout(() => showMatchPopup(user, 999), 500);
    }
  }
}

async function doPass() {
  // Just advance, no API call needed for pass in demo
}

// ─── MATCH POPUP ─────────────────────────────────────────────────────────────
function showMatchPopup(user, matchId) {
  currentMatchId = matchId;
  const popup = document.getElementById("match-popup");
  const myAvatar = document.getElementById("mp-my-avatar");
  const theirAvatar = document.getElementById("mp-their-avatar");

  if (currentUser?.photos?.[0]) {
    myAvatar.innerHTML = `<img src="${currentUser.photos[0]}" alt="Я">`;
  } else {
    myAvatar.textContent = "😊";
  }
  if (user.photos?.[0]) {
    theirAvatar.innerHTML = `<img src="${user.photos[0]}" alt="${user.name}">`;
  } else {
    theirAvatar.textContent = "😍";
  }

  popup.classList.add("show");
  if (tg) tg.HapticFeedback?.notificationOccurred("success");
}

function closeMatchPopup() {
  document.getElementById("match-popup").classList.remove("show");
}

function openMatchChat() {
  closeMatchPopup();
  if (currentMatchId) {
    openChat(currentMatchId, openMatchData?.user?.name || "Новый матч",
      openMatchData?.user?.photos?.[0] || null);
  }
}

// ─── MATCHES PAGE ─────────────────────────────────────────────────────────────
async function loadMatches() {
  const content = document.getElementById("matches-content");
  content.innerHTML = `<div class="loading-wrap"><div class="spinner"></div></div>`;

  let matches;
  try {
    matches = await apiCall("GET", "/matches");
  } catch (e) {
    matches = getMockMatches();
  }

  if (matches.length === 0) {
    content.innerHTML = `<div class="empty-state">
      <div class="empty-icon">💔</div>
      <div class="empty-title">Пока нет матчей</div>
      <div class="empty-text">Лайкайте анкеты и ждите взаимности!</div>
    </div>`;
    return;
  }

  const grid = document.createElement("div");
  grid.className = "matches-grid";

  matches.forEach((m, i) => {
    const u = m.other_user;
    const photo = u.photos?.[0];
    grid.innerHTML += `<div class="match-card" onclick="openChat(${m.id}, '${u.name}', '${photo || ''}')">
      <div class="match-photo">
        ${photo ? `<img src="${photo}" alt="${u.name}" onerror="this.style.display='none'">` : `<span>👤</span>`}
        ${i < 2 ? `<div class="new-match-badge">НОВЫЙ</div>` : ""}
      </div>
      <div class="match-info">
        <div class="match-name">${u.name}</div>
        <div class="match-age">${u.age} лет</div>
      </div>
    </div>`;
  });

  content.innerHTML = "";
  content.appendChild(grid);
}

// ─── CHATS PAGE ──────────────────────────────────────────────────────────────
async function loadChats() {
  const list = document.getElementById("chat-list");
  list.innerHTML = `<div class="loading-wrap"><div class="spinner"></div></div>`;

  let matches;
  try {
    matches = await apiCall("GET", "/matches");
  } catch (e) {
    matches = getMockMatches();
  }

  if (matches.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">💬</div>
      <div class="empty-title">Нет диалогов</div>
      <div class="empty-text">Сначала нужно сделать матч!</div>
    </div>`;
    return;
  }

  list.innerHTML = "";
  matches.forEach(m => {
    const u = m.other_user;
    const photo = u.photos?.[0];
    const item = document.createElement("div");
    item.className = "chat-item";
    item.onclick = () => openChat(m.id, u.name, photo);
    item.innerHTML = `
      <div class="chat-avatar">
        ${photo ? `<img src="${photo}" alt="${u.name}">` : `👤`}
        <div class="avatar-online"></div>
      </div>
      <div class="chat-content">
        <div class="chat-name">${u.name}, ${u.age}</div>
        <div class="chat-preview">Начните общение! 💬</div>
      </div>
      <div class="chat-meta">
        <div class="chat-time">сейчас</div>
      </div>`;
    list.appendChild(item);
  });
}

// ─── CHAT VIEW ────────────────────────────────────────────────────────────────
async function openChat(matchId, name, photo) {
  currentMatchId = matchId;
  const view = document.getElementById("chat-view");
  document.getElementById("cv-name").textContent = name;

  const cvAvatar = document.getElementById("cv-avatar");
  if (photo) {
    cvAvatar.innerHTML = `<img src="${photo}" alt="${name}">`;
  } else {
    cvAvatar.textContent = "👤";
  }

  view.classList.add("open");
  document.getElementById("messages-list").innerHTML = `<div class="loading-wrap"><div class="spinner"></div></div>`;

  try {
    const msgs = await apiCall("GET", `/matches/${matchId}/messages`);
    renderMessages(msgs);
  } catch (e) {
    renderMessages([]);
  }
}

function renderMessages(msgs) {
  const list = document.getElementById("messages-list");
  if (msgs.length === 0) {
    list.innerHTML = `<div style="text-align:center;color:var(--text-muted);margin-top:40px;font-size:14px">
      💬 Начните разговор первыми!
    </div>`;
    return;
  }
  list.innerHTML = msgs.map(m => `
    <div class="message ${m.is_mine ? 'mine' : 'theirs'}">
      ${m.text || '📷'}
      <div class="message-time">${formatTime(m.created_at)}</div>
    </div>`).join("");
  list.scrollTop = list.scrollHeight;
}

function closeChat() {
  document.getElementById("chat-view").classList.remove("open");
  currentMatchId = null;
}

async function sendMessage() {
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if (!text || !currentMatchId) return;
  input.value = "";
  input.style.height = "";

  const list = document.getElementById("messages-list");
  const msgEl = document.createElement("div");
  msgEl.className = "message mine";
  msgEl.innerHTML = `${text}<div class="message-time">${formatTime(new Date().toISOString())}</div>`;
  list.appendChild(msgEl);
  list.scrollTop = list.scrollHeight;

  try {
    await apiCall("POST", `/matches/${currentMatchId}/messages`, { text });
  } catch (e) {
    // Demo mode — message shown already
  }
}

function handleMsgKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

// ─── PROFILE PAGE ─────────────────────────────────────────────────────────────
function renderProfile() {
  const u = currentUser;
  if (!u) return;

  const content = document.getElementById("profile-content");
  const heroPhoto = u.photos?.[0];

  content.innerHTML = `
    <div class="profile-hero">
      ${heroPhoto ? `<img class="profile-hero-img" src="${heroPhoto}" alt="${u.name}">` : ''}
      <div class="profile-hero-gradient"></div>
    </div>
    <div class="profile-avatar-wrap">
      <div class="profile-avatar" onclick="document.getElementById('photo-input').click()">
        ${heroPhoto ? `<img src="${heroPhoto}" alt="${u.name}">` : `👤`}
      </div>
    </div>
    <div class="profile-body">
      <div class="profile-display-name">${u.name}</div>
      ${u.city ? `<div class="profile-location">📍 ${u.city}</div>` : ''}

      <div class="profile-section">
        <div class="section-label">Имя</div>
        <input class="input-field" id="pf-name" value="${u.name}" placeholder="Ваше имя">
      </div>
      <div style="display:flex;gap:12px" class="profile-section">
        <div style="flex:1">
          <div class="section-label">Возраст</div>
          <input class="input-field" id="pf-age" type="number" value="${u.age}" placeholder="Возраст">
        </div>
        <div style="flex:2">
          <div class="section-label">Город</div>
          <input class="input-field" id="pf-city" value="${u.city || ''}" placeholder="Ваш город">
        </div>
      </div>
      <div class="profile-section">
        <div class="section-label">О себе</div>
        <textarea class="input-field" id="pf-bio" placeholder="Расскажите о себе...">${u.bio || ''}</textarea>
      </div>

      <div class="profile-section">
        <div class="section-label">Интересы</div>
        <div class="interests-wrap" id="interests-wrap">
          ${INTERESTS_LIST.map(i => `
            <div class="interest-chip ${(u.interests || []).includes(i) ? 'selected' : ''}"
              onclick="toggleInterest(this)">${i}</div>`).join("")}
        </div>
      </div>

      <div class="profile-section">
        <div class="section-label">Фото (до 5)</div>
        <div class="photos-grid" id="photos-grid">
          ${buildPhotosGrid(u.photos || [])}
        </div>
      </div>

      <button class="save-btn" id="save-btn" onclick="saveProfile()">💾 Сохранить профиль</button>
      <div style="height:20px"></div>
    </div>`;
}

function buildPhotosGrid(photos) {
  let html = photos.map((p, i) => `
    <div class="photo-slot">
      <img src="${p}" alt="Фото ${i+1}" onerror="this.parentElement.innerHTML='<div class=add-icon>+</div>'">
      <button class="remove-photo" onclick="removePhoto(${i},event)">×</button>
    </div>`).join("");

  if (photos.length < 5) {
    html += `<div class="photo-slot" onclick="document.getElementById('photo-input').click()">
      <div class="add-icon">📷</div>
    </div>`;
  }
  return html;
}

function toggleInterest(el) {
  el.classList.toggle("selected");
}

async function saveProfile() {
  const btn = document.getElementById("save-btn");
  btn.textContent = "Сохраняю...";
  btn.disabled = true;

  const interests = [...document.querySelectorAll(".interest-chip.selected")].map(el => el.textContent);
  const data = {
    name: document.getElementById("pf-name").value.trim(),
    age: parseInt(document.getElementById("pf-age").value),
    city: document.getElementById("pf-city").value.trim(),
    bio: document.getElementById("pf-bio").value.trim(),
    interests
  };

  try {
    currentUser = await apiCall("PUT", "/me", data);
    showToast("✅ Профиль сохранён");
  } catch(e) {
    Object.assign(currentUser, data);
    showToast("✅ Профиль обновлён (демо)");
  }

  btn.textContent = "💾 Сохранить профиль";
  btn.disabled = false;
  renderProfile();
}

async function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = "";

  const reader = new FileReader();
  reader.onload = (e) => {
    const photos = currentUser.photos || [];
    if (photos.length < 5) {
      photos.push(e.target.result);
      currentUser.photos = photos;
      renderProfile();
      showToast("📸 Фото добавлено!");
    }
  };
  reader.readAsDataURL(file);

  // Upload to server
  const formData = new FormData();
  formData.append("file", file);
  try {
    const res = await fetch(API_BASE + "/me/photo", {
      method: "POST",
      headers: { "X-Telegram-Init-Data": tg?.initData || "test" },
      body: formData
    });
    if (res.ok) {
      const data = await res.json();
      currentUser.photos = data.photos;
    }
  } catch(e) { /* demo mode */ }
}

function removePhoto(idx, event) {
  event.stopPropagation();
  currentUser.photos = (currentUser.photos || []).filter((_, i) => i !== idx);
  renderProfile();
}

// ─── FILTER MODAL ────────────────────────────────────────────────────────────
function openFilter() {
  document.getElementById("filter-modal").classList.add("open");
  if (currentUser) {
    document.getElementById("min-age").value = currentUser.min_age_filter || 18;
    document.getElementById("max-age").value = currentUser.max_age_filter || 45;
    updateAgeLabel();
  }
}

function handleModalClick(e) {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove("open");
}

function updateAgeLabel() {
  const min = document.getElementById("min-age").value;
  const max = document.getElementById("max-age").value;
  document.getElementById("age-range-label").textContent = `${min}–${max}`;
}

function selectOption(btn, groupId) {
  document.querySelectorAll(`#${groupId} .select-option`).forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

async function applyFilters() {
  const minAge = parseInt(document.getElementById("min-age").value);
  const maxAge = parseInt(document.getElementById("max-age").value);
  const lookingFor = document.querySelector("#gender-filter .select-option.active")?.dataset.value || "any";

  document.getElementById("filter-modal").classList.remove("open");
  showToast("🔍 Фильтры применены");

  try {
    await apiCall("PUT", "/me", { min_age_filter: minAge, max_age_filter: maxAge, looking_for: lookingFor });
  } catch(e) { /* demo */ }

  await loadDiscover();
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function switchPage(pageName, btn) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`page-${pageName}`).classList.add("active");
  btn.classList.add("active");

  if (pageName === "matches") loadMatches();
  if (pageName === "chats") loadChats();
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2500);
}

function formatTime(isoString) {
  try {
    const d = new Date(isoString);
    return d.toLocaleTimeString("ru", { hour: "2-digit", minute: "2-digit" });
  } catch { return ""; }
}

// ─── START ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
